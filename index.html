<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ecobot Alertas</title>
  <style>
    .message {
      padding: 10px;
      margin-top: 15px;
      border-radius: 5px;
      display: none; /* Escondido por padrão */
    }
    .success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
  </style>
</head>
<body>
  <h1>Inscreva-se para receber alertas ambientais</h1>
  <form id="subscribe-form">
    <label for="email">Seu e-mail:</label>
    <input type="email" id="email" name="email" required>
    <button type="submit" id="submit-button">Inscrever</button>
  </form>

  <!-- Divs para as mensagens -->
  <div id="message-success" class="message success"></div>
  <div id="message-error" class="message error"></div>

  <script>
    const form = document.getElementById('subscribe-form');
    const emailInput = document.getElementById('email');
    const submitButton = document.getElementById('submit-button');
    const msgSuccess = document.getElementById('message-success');
    const msgError = document.getElementById('message-error');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      
      // Desabilitar botão para evitar cliques múltiplos
      submitButton.disabled = true;
      submitButton.innerText = 'Enviando...';

      // Limpar mensagens antigas
      msgSuccess.style.display = 'none';
      msgError.style.display = 'none';

      try {
        const response = await fetch('/subscribe', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ email: emailInput.value }),
        });

        const responseText = await response.text();

        if (response.ok) {
          msgSuccess.innerText = responseText;
          msgSuccess.style.display = 'block';
          emailInput.value = ''; // Limpa o campo de e-mail
        } else {
          msgError.innerText = responseText; // Mostra a mensagem de erro do servidor
          msgError.style.display = 'block';
        }
      } catch (error) {
        msgError.innerText = 'Um erro de rede ocorreu. Tente novamente.';
        msgError.style.display = 'block';
      } finally {
        // Habilitar o botão novamente
        submitButton.disabled = false;
        submitButton.innerText = 'Inscrever';
      }
    });
  </script>
</body>
</html>
