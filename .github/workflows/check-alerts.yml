name: "🚨 Verificar Alertas Automáticos"

on:
  schedule:
    - cron: '*/5 * * * *' # Executa a cada 5 minutos
  workflow_dispatch:      # Permite rodar manualmente para testar

jobs:
  check_alerts:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar dependências
        run: npm install

      - name: Verificar alertas automáticos
        # CORREÇÃO: Removido o 'cd backend' e o 'scripts/'. Roda direto na raiz.
        run: node check-alerts.js
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          TAGO_TOKEN_1: ${{ secrets.TAGO_TOKEN_1 }}
          TAGO_TOKEN_2: ${{ secrets.TAGO_TOKEN_2 }}
          ALERT_EMAILS: ${{ secrets.ALERT_EMAILS }}
