name: "🚨 Verificar Alertas Automáticos"

on:
  schedule:
    - cron: '*/5 * * * *'
  
  workflow_dispatch:

jobs:
  check_alerts:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Instalar dependências
        run: npm install

      - name: Verificar alertas automáticos
        run: node scripts/check-alerts.js
        env:
          EMAIL_USER: pjt.ecobot@gmail.com
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          TAGO_TOKEN_1: b8880259-b7b8-4317-add7-f8499b2b331c
          TAGO_TOKEN_2: 2fcbccc4-3614-43a6-81c9-270f56c3c109
          ALERT_EMAILS: vinnysky23@gmail.com

      - name: ✅ Verificação concluída
        if: success()
        run: echo "🟢 Alertas verificados!"

      - name: ❌ Erro
        if: failure()
        run: echo "🔴 Erro ao verificar alertas"
