name: "🚨 Verificar Alertas Automáticos"

on:
  schedule:
    - cron: '*/5 * * * *' # Corre a cada 5 minutos
  workflow_dispatch:      # Permite correr manualmente

jobs:
  check_alerts:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Instalar dependências
        run: npm install

      - name: Verificar alertas automáticos
        # REMOVIDO o 'cd backend' e o 'scripts/' pois o ficheiro está na raiz
        run: node check-alerts.js
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          TAGO_TOKEN_1: ${{ secrets.TAGO_TOKEN_1 }}
          TAGO_TOKEN_2: ${{ secrets.TAGO_TOKEN_2 }}
          ALERT_EMAILS: ${{ secrets.ALERT_EMAILS }}

      - name: ✅ Sucesso
        if: success()
        run: echo "🟢 Verificação concluída sem erros!"

      - name: ❌ Erro
        if: failure()
        run: echo "🔴 Ocorreu um erro no processo"
